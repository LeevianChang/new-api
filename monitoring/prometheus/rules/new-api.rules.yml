groups:
  - name: new-api-sli
    rules:
      - record: newapi:http_qps:rate1m
        expr: sum(rate(newapi_http_requests_total[1m]))

      - record: newapi:http_error_rate:ratio5m
        expr: |
          sum(rate(newapi_http_requests_total{status_class=~"4xx|5xx"}[5m]))
          /
          clamp_min(sum(rate(newapi_http_requests_total[5m])), 1)

      - record: newapi:relay_qps:rate1m
        expr: sum(rate(newapi_relay_requests_total[1m]))

      - record: newapi:relay_error_rate:ratio5m
        expr: |
          sum(rate(newapi_relay_requests_total{status_class=~"4xx|5xx"}[5m]))
          /
          clamp_min(sum(rate(newapi_relay_requests_total[5m])), 1)

      - record: newapi:relay_error_rate_by_channel:ratio5m
        expr: |
          sum by (channel_id, channel_name, channel_type) (rate(newapi_relay_requests_total{status_class=~"4xx|5xx"}[5m]))
          /
          clamp_min(sum by (channel_id, channel_name, channel_type) (rate(newapi_relay_requests_total[5m])), 0.001)

  - name: new-api-alerts
    rules:
      - alert: NewAPIInstanceDown
        expr: up{job="new-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "new-api 实例不可用"
          description: "Prometheus 连续 2 分钟无法抓取 new-api:3000/metrics。"

      - alert: DatabaseDependencyDown
        expr: newapi_dependency_up{dependency="database"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "数据库依赖异常"
          description: "应用侧数据库健康探测连续 2 分钟失败。"

      - alert: RedisDependencyDown
        expr: newapi_dependency_up{dependency="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis 依赖异常"
          description: "应用侧 Redis 健康探测连续 2 分钟失败。"

      - alert: NewAPIHighHTTPErrorRate
        expr: |
          newapi:http_error_rate:ratio5m > 0.10
          and
          sum(rate(newapi_http_requests_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 错误率过高"
          description: "最近 5 分钟应用 4xx/5xx 错误占比超过 10%，并持续 10 分钟。"

      - alert: NewAPIRelayHighErrorRate
        expr: |
          newapi:relay_error_rate:ratio5m > 0.15
          and
          sum(rate(newapi_relay_requests_total[5m])) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Relay 错误率过高"
          description: "最近 5 分钟 relay 错误占比超过 15%，并持续 10 分钟。"

      - alert: DownstreamProbeFailed
        expr: probe_success{job="downstream-tcp"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "下游连通性异常"
          description: "blackbox 探测 {{ $labels.instance }} 连续 3 分钟不可达。"
